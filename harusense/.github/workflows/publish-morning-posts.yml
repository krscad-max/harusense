name: Publish scheduled morning posts

on:
  schedule:
    - cron: '15 12 * * *'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Publish posts scheduled for today
        run: python tools/publish_scheduled_posts.py

      - name: Commit changes if any
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/posts/*.md
          git commit -m "Publish scheduled morning post"
          git push
