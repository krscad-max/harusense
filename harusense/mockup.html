<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>HaruSense Mockup</title>
<link rel="stylesheet" href="/harusense/public/styles.css" />
</head>
<body>
<header style="padding:24px;background:#fff;border-bottom:1px solid #eee">
  <img src="/harusense/public/images/logo-option-a.svg" alt="logo" style="height:60px;" />
</header>
<main style="padding:40px;">
  <section style="display:flex;gap:24px;align-items:center;max-width:1000px;margin:0 auto;">
    <div style="flex:1">
      <h1 style="font-size:36px;color:#111;margin:0 0 12px">매일 쓸모 있는 한 가지, 하루센스</h1>
      <p style="color:#444;margin:0 0 16px">생활을 더 편하게 만드는 실용 팁·절약 노하우·검증된 아이디어를 매일 제공합니다.</p>
      <div>
        <a href="#" style="background:#1E73BE;color:#fff;padding:10px 16px;border-radius:6px;text-decoration:none;margin-right:8px;">오늘의 팁 보기</a>
        <a href="#" style="padding:10px 16px;border-radius:6px;text-decoration:none;border:1px solid #eee;color:#6B7280;">카테고리 둘러보기</a>
      </div>
    </div>
    <div style="width:380px">
      <div style="width:100%;height:240px;background:linear-gradient(135deg,#f3f9ff,#fff);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#7aa7e6">히어로 이미지</div>
    </div>
  </section>

  <section style="max-width:1000px;margin:40px auto">
    <h2>최신 글</h2>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:12px">
      <div style="border:1px solid #eee;border-radius:8px;overflow:hidden">
        <div style="height:140px;background:#ddd"></div>
        <div style="padding:12px"><h3 style="margin:0 0 8px">5분 아침 루틴으로 생산성 끌어올리기</h3><p style="margin:0;color:#666">짧은 루틴으로 아침의 흐름을 통제하는 방법과 도구 추천.</p></div>
      </div>
      <div style="border:1px solid #eee;border-radius:8px;overflow:hidden">
        <div style="height:140px;background:#ddd"></div>
        <div style="padding:12px"><h3 style="margin:0 0 8px">월별 지출 10% 절약하는 체크리스트</h3><p style="margin:0;color:#666">구독 취소와 자동화로 지출을 줄이는 실전 체크리스트.</p></div>
      </div>
      <div style="border:1px solid #eee;border-radius:8px;overflow:hidden">
        <div style="height:140px;background:#ddd"></div>
        <div style="padding:12px"><h3 style="margin:0 0 8px">가성비 주방 가젯 7선 (2026년)</h3><p style="margin:0;color:#666">주방 시간을 절이고 만족도를 높여주는 가젯 추천.</p></div>
      </div>
    </div>
  </section>
</main>
<footer style="padding:24px;text-align:center;color:#777;border-top:1px solid #eee">© 2026 HaruSense — 하루센스</footer>
</body>
</html>
