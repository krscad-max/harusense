<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nosaic Note</title>
<style>
:root{ --bg:#f6f7fb; --card:#fff; --text:#1f2937; --muted:#6b7280; --line:#e5e7eb; --shadow:0 10px 25px rgba(0,0,0,.06); --shadowHover:0 18px 40px rgba(0,0,0,.10); --radius:14px; --accent:#6366f1; --max:1100px; }
*{box-sizing:border-box;} html{scroll-behavior:smooth;} body{ margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background:var(--bg); color:var(--text); line-height:1.6; }
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}} .page{animation:fadeUp .6s ease both;} .topbar{ position:sticky; top:0; z-index:20; backdrop-filter: blur(10px); background: rgba(246,247,251,.85); border-bottom:1px solid var(--line); } .topbar-inner{ max-width:var(--max); margin:0 auto; padding:14px 18px; display:flex; align-items:center; justify-content:space-between; gap:16px; } .brand{display:flex; align-items:baseline; gap:10px; text-decoration:none; color:inherit;} .brand strong{font-size:1.2rem; letter-spacing:.6px; position:relative;} .brand span{color:var(--muted); font-size:.92rem;} nav{display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end;} .nav-pill{ text-decoration:none; color:var(--text); border:1px solid var(--line); background:#fff; padding:8px 12px; border-radius:999px; font-size:.92rem; transition: transform .2s ease, box-shadow .2s ease; } .nav-pill:hover{transform:translateY(-2px); box-shadow:0 8px 18px rgba(0,0,0,.08);} .hero{ max-width:var(--max); margin:0 auto; padding:46px 18px 18px; display:grid; grid-template-columns:1.3fr .7fr; gap:18px; } .hero-main{ background: linear-gradient(135deg, #ffffff, #f3f6ff); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:26px; } .hero-main h1{margin:0 0 10px; font-size:2.1rem; letter-spacing:.4px;} .hero-main p{margin:0 0 16px; color:var(--muted); max-width:60ch;} .cta-row{display:flex; gap:10px; flex-wrap:wrap;} .btn{ border:1px solid var(--line); background:#fff; border-radius:999px; padding:10px 14px; text-decoration:none; color:var(--text); font-weight:650; font-size:.95rem; display:inline-flex; align-items:center; gap:8px; transition: transform .2s ease, box-shadow .2s ease; position:relative; overflow:hidden; } .btn:hover{transform:translateY(-2px); box-shadow:0 10px 22px rgba(0,0,0,.10);} .hero-side{ background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:20px; display:flex; flex-direction:column; gap:12px; } .mini-title{margin:0; font-size:1rem;} .taglist{display:flex; flex-wrap:wrap; gap:8px;} .tag{ border:1px solid var(--line); background:#fff; padding:6px 10px; border-radius:999px; font-size:.85rem; color:var(--muted); text-decoration:none; transition: transform .2s ease, box-shadow .2s ease; } .tag:hover{transform:translateY(-2px); box-shadow:0 8px 18px rgba(0,0,0,.08);} .wrap{ max-width:var(--max); margin:0 auto; padding:8px 18px 60px; display:grid; grid-template-columns:1fr .38fr; gap:18px; align-items:start; }
.post{ background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:18px 18px 16px; margin-bottom:14px; text-decoration:none; color:inherit; display:block; position:relative; overflow:hidden; transition: transform .28s ease, box-shadow .28s ease; } .post::before{ content:""; position:absolute; inset:-60%; background: radial-gradient(circle at 30% 30%, rgba(99,102,241,.10), transparent 55%); opacity:0; transition: opacity .28s ease; } .post:hover{transform:translateY(-6px); box-shadow:var(--shadowHover);} .post:hover::before{opacity:1;} .post-meta{display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:8px; color:var(--muted); font-size:.88rem; position:relative; z-index:1;} .badge{border:1px solid var(--line); padding:4px 10px; border-radius:999px; background:#fff; color:var(--text); font-size:.82rem; font-weight:700;} .post h2{margin:0 0 8px; font-size:1.25rem; position:relative; z-index:1;} .post p{margin:0 0 12px; color:var(--muted); position:relative; z-index:1;} .readmore{font-weight:700; font-size:.95rem; position:relative; z-index:1;} .side-card{ background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:18px; margin-bottom:14px; } .side-card h3{margin:0 0 10px; font-size:1rem;} .small{color:var(--muted); font-size:.9rem; margin:0;} .side-links{display:flex; flex-direction:column; gap:8px;} .side-links a{ text-decoration:none; color:var(--text); padding:10px 12px; border:1px solid var(--line); border-radius:12px; background:#fff; transition: transform .2s ease, box-shadow .2s ease; } .side-links a:hover{transform:translateY(-2px); box-shadow:0 10px 18px rgba(0,0,0,.08);} footer{border-top:1px solid var(--line); padding:26px 18px; color:var(--muted); text-align:center; font-size:.9rem;} @media (max-width:900px){ .hero{grid-template-columns:1fr;} .wrap{grid-template-columns:1fr;} nav{justify-content:flex-start;} } @media (prefers-reduced-motion: reduce){ *{animation:none !important; transition:none !important;} html{scroll-behavior:auto;} }
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="index.html">
        <strong>Nosaic Note</strong>
        <span>생각과 기록의 모자이크</span>
      </a>
      <nav>
        <a class="nav-pill" href="posts.html">전체 글</a>
        <a class="nav-pill" href="lotto.html">로또 추천</a>
        <a class="nav-pill" href="admin.html">관리자</a>
      </nav>
    </div>
  </div>
  <section class="hero">
    <div class="hero-main">
      <h1>Nosaic Note</h1>
      <p>짧은 글, 메모, 추천을 한 곳에 모아두는 작은 블로그 홈입니다. 메인에는 “최신 글”이 자동으로 보여요.</p>
      <div class="cta-row">
        <a class="btn" href="posts.html">📝 전체 글 보기</a>
        <a class="btn" href="admin.html">✍️ 글 쓰기(관리자)</a>
        <a class="btn" href="lotto.html">🎲 로또 추천</a>
      </div>
    </div>
    <aside class="hero-side">
      <h2 class="mini-title">빠른 메뉴</h2>
      <div class="taglist">
        <a class="tag" href="posts.html#category=article">아티클</a>
        <a class="tag" href="posts.html#category=misc">잡동사니</a>
        <a class="tag" href="posts.html#category=recommend">추천</a>
      </div>
      <p class="small">팁: 글은 관리자 페이지에서 추가/수정/삭제할 수 있어요(브라우저 저장).</p>
    </aside>
  </section>
  <main class="wrap">
    <section>
      <h2 style="margin:0 0 10px; font-size:1.1rem; color:var(--muted);">최신 글</h2>
      <div id="latest"></div>
    </section>
    <aside>
      <div class="side-card">
        <h3>카테고리</h3>
        <div class="side-links">
          <a href="posts.html#category=article">📝 아티클</a>
          <a href="posts.html#category=misc">📦 잡동사니</a>
          <a href="posts.html#category=recommend">⭐ 추천</a>
        </div>
      </div>
    </aside>
  </main>
  <footer>© 2026 Nosaic Note</footer>
</div>
<script>
async function loadLatest(){
  try{
    const res=await fetch('posts.json'); const posts=await res.json(); const c=document.getElementById('latest');
    if(!posts||posts.length===0){c.innerHTML='<p>아직 게시물이 없습니다.</p>';return}
    posts.slice(0,6).forEach(p=>{const a=document.createElement('a');a.className='post';a.href=p.url||('post.html?id='+p.id);a.innerHTML=`<div class="post-meta"><span class="badge">${p.category||'글'}</span><span>• ${p.date||''}</span></div><h2>${p.title}</h2><p>${p.summary||''}</p><div class="readmore">읽기 →</div>`;c.appendChild(a)})
  }catch(e){document.getElementById('latest').innerHTML='<p>게시물 로드 에러</p>'}}
loadLatest();
</script>
</body>
</html>
