<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Lotto — Nosaic Note</title><link rel="stylesheet" href="index.html"></head><body>
<div style="max-width:920px;margin:24px auto;padding:24px">
  <h1>Korean Lotto Helper</h1>
  <p>Simple random recommendations and historic picks placeholder.</p>
  <button id="gen" class="btn">Generate Picks</button>
  <div id="picks" style="margin-top:16px;font-weight:700"></div>
  <p><a href="index.html">← Home</a></p>
</div>
<script>
document.getElementById('gen').addEventListener('click',()=>{
 const nums=[]; while(nums.length<6){ const n=Math.floor(Math.random()*45)+1; if(!nums.includes(n)) nums.push(n);} document.getElementById('picks').textContent=nums.sort((a,b)=>a-b).join(', ');
});
</script>
</body></html>
